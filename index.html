<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알람</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="news/news.css">
</head>
<body>
  <div class="app">
    <header class="clock">
      <img src="image/alarm.png" alt="알람 시계" class="clock-icon">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">2026년 1월 1일 목요일</div>
    </header>

    <section class="add-alarm">
      <input type="time" id="alarmTimeInput">
      <input type="text" id="alarmLabelInput" placeholder="알람 이름 (선택)" maxlength="30">
      <div class="repeat-days" id="repeatDays">
        <button type="button" class="day-btn" data-day="0">일</button>
        <button type="button" class="day-btn" data-day="1">월</button>
        <button type="button" class="day-btn" data-day="2">화</button>
        <button type="button" class="day-btn" data-day="3">수</button>
        <button type="button" class="day-btn" data-day="4">목</button>
        <button type="button" class="day-btn" data-day="5">금</button>
        <button type="button" class="day-btn" data-day="6">토</button>
      </div>
      <button type="button" id="addAlarmBtn" class="add-btn">알람 추가</button>
    </section>

    <section class="alarm-list-section">
      <h2>알람 목록</h2>
      <ul class="alarm-list" id="alarmList"></ul>
      <p class="empty-msg" id="emptyMsg">등록된 알람이 없습니다.</p>
    </section>

    <section class="save-section">
      <button type="button" id="saveNowBtn" class="save-btn">지금 저장</button>
      <p class="save-status" id="saveStatus"></p>
    </section>

    <section class="news-section">
      <button type="button" id="newsBtn" class="news-btn">최근뉴스</button>
      <ul class="news-list" id="newsList"></ul>
    </section>

    <footer class="weather" id="weather">
      <span class="weather-icon">🌡️</span>
      <span class="weather-temp" id="weatherTemp">기온 불러오는 중...</span>
    </footer>
  </div>

  <div class="keyword-modal-overlay" id="keywordModalOverlay">
    <div class="keyword-modal">
      <p class="keyword-modal-label">검색할 뉴스 키워드를 입력하세요.</p>
      <input type="text" id="keywordModalInput" class="keyword-modal-input" maxlength="50">
      <div class="keyword-modal-actions">
        <button type="button" id="keywordModalCancelBtn">취소</button>
        <button type="button" id="keywordModalConfirmBtn">확인</button>
      </div>
    </div>
  </div>

  <div class="ringing-overlay" id="ringingOverlay">
    <div class="ringing-box">
      <div class="ringing-icon">⏰</div>
      <div class="ringing-time" id="ringingTime">00:00</div>
      <div class="ringing-label" id="ringingLabel"></div>
      <ul class="news-list news-briefing-list" id="newsBriefingList"></ul>
      <div class="ringing-actions">
        <button type="button" id="snoozeBtn">5분 후 다시 알림</button>
        <button type="button" id="stopBtn">알람 끄기</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="news/news.js"></script>
</body>
</html>
